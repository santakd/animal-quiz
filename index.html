<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Quiz Show</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 2rem;
        }

        h2 { margin-top: 0; }

        p { color: var(--text-muted); line-height: 1.6; }

        .progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .image-container {
            width: 100%;
            height: 250px;
            background-color: #f9fafb;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #e5e7eb;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .btn-start, .btn-restart {
            width: 100%;
            font-size: 1.2rem;
            padding: 16px;
            margin-top: 1rem;
        }

        .correct { background-color: var(--success-color) !important; }
        .incorrect { background-color: var(--error-color) !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .choices-grid { grid-template-columns: 1fr; }
            .quiz-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>Animal Quiz</h1>
            <!-- The number of questions is now injected dynamically via JS -->
            <p>Test your animal knowledge! You will be shown <span id="intro-total-q"></span> random animals. Select the correct name from the 4 choices.</p>
            <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <!-- Total is injected dynamically -->
            <div class="progress">Question <span id="current-q">1</span> of <span id="total-q"></span></div>
            <div class="image-container">
                <img id="animal-image" src="" alt="Guess the animal" onerror="this.onerror=null; this.alt='Image not found! Please check your img folder.';">
            </div>
            <div class="choices-grid" id="choices-container">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h1>Quiz Complete!</h1>
            <p>You scored</p>
            <!-- Total is injected dynamically -->
            <h2 style="font-size: 3rem; color: var(--primary-color); margin: 10px 0;"><span id="score">0</span> / <span id="final-total"></span></h2>
            <p id="feedback-message"></p>
            <button class="btn-restart" onclick="initApp()">Play Again</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        
        // You can change this number to anything. 
        // The entire UI and game logic will adapt automatically.
        // If you set it to 20 but only have 15 animals, it will just use 15.
        // ⚠️ Make sure to update the 'animalNames' array accordingly if you change this number.
        // For example, if you set it to 5, the quiz will only ask 5 questions randomly selected from your list.
        // This allows you to have a large pool of animals but only ask a subset each time for more replayability.
        // Note: The minimum number of animals you should have in the 'animalNames' array is 4, otherwise the quiz won't work properly.
        // If you want to ask all animals every time, set this to a number larger than your total animals (e.g., 100).
        // The quiz will automatically limit it to the number of animals you have if you set it too high.
        // Example: If you have 15 animals in the 'animalNames' array and set this to 10, each quiz session will randomly select 10 out of those 15 animals to ask about.
        // This adds variety to each quiz session and encourages players to replay to see different animals.
        // If you want to ask all animals every time, simply set this to a number larger than your total animals (e.g., 100).
        // The quiz will automatically limit it to the number of animals you have if you set it too high.
        // In summary, this setting allows you to control how many questions are asked in each quiz session, and the quiz will adapt accordingly based on the number of animals you have in your list.
        // The quiz will randomly select from the 'animalNames' list to create questions, so you can have a large pool of animals and only ask about a subset each time for more replayability.
        const QUESTIONS_PER_GAME = 10; 
        const FILE_SUFFIX = " 512.gif";
        const FOLDER_PATH = "img/";

        // ⚠️ EDIT THIS ARRAY: PLEASE REFER ARRAY_GEN.PY TO GENERATE THE CORRECT NAMES IN ARRAY_GEN.TXT BASED ON YOUR IMAGE FILES 
        // Add the exact names of the animals as they appear in your filenames (without " 512.gif")
        // For example, if you have "img/Cat 512.gif", you should add "Cat" to this array. 
        // Make sure to have at least 4 animals in this list for the quiz to work properly, as each question requires one correct answer and three wrong answers.
        // This array is crucial for the quiz to function, as it determines which animals will be included in the quiz questions. 
        // The quiz will randomly select from this list to create questions. You can have as many animals as you want, but remember to update the 'QUESTIONS_PER_GAME' setting if you want to ask about all of them in each session.
        // Example: If you have 15 animals in this list and set QUESTIONS_PER_GAME to 10, each quiz session will randomly select 10 out of those 15 animals to ask about, adding variety to each playthrough.
        // If you want to ask about all animals every time, simply set QUESTIONS_PER_GAME to a number larger than the length of this array (e.g., 100), and the quiz will automatically limit it to the number of animals you have.
        // Note: The names in this array should match the filenames of your images (without the " 512.gif" part). 
        // For example, if you have an image named "img/Lion 512.gif", you should include "Lion" in this array.
        // This array is crucial for the quiz to function, as it determines which animals will be included in the quiz questions. 
        // Make sure to keep it updated with the correct animal names that correspond to your image files.
        // The quiz will randomly select from this list to create questions. You can have as many animals as you want, but remember to update the 'QUESTIONS_PER_GAME' setting if you want to ask about all of them in each session.
        // In summary, this array should contain the names of all the animals you want to include in your quiz, and it should match the filenames of your images (without the " 512.gif" suffix). 
        // The quiz will use this list to generate questions and options for the players. 

        const animalNames = [
            "Ant", "Bat", "Bee", "Bird", "Butterfly", "Chick", "Cockroach", "Crab",
            "Cricket", "Crocodile", "Dinosaur", "Dog", "Dolphin", "Dove", "Eagle", "Fish",
            "Flamingo", "Fly", "Goat", "Goose", "Gorilla", "Hedgehog", "Horse", "Jellyfish",
            "Kangaroo", "Ladybug", "Lobster", "Monkey", "Mosquito", "Octopus", "Orangutan", "Orca",
            "Otter", "Owl", "Ox", "Peacock", "Penguin", "Phoenix", "Pig", "Rabbit",
            "Raccoon", "Rat", "Rooster", "Scorpion", "Seal", "Shark", "Snail", "Snake",
            "Spider", "Squirrel", "Tiger", "Turtle", "Whale"
        ];

        // ==========================================
        // APPLICATION STATE
        // ==========================================
        let currentQuestionIndex = 0;
        let score = 0;
        let quizQuestions = [];
        let totalQuestionsToPlay = 0; // Will be calculated based on config and available images

        // DOM Elements
        // Caching DOM elements for better performance and cleaner code
        // We store references to the different screens and important elements in the UI for easy access throughout the application. 
        // This allows us to manipulate the DOM efficiently when we need to show/hide screens, update text, load images, and handle user interactions.
        const screens = {
            start: document.getElementById('start-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };
        // We also cache specific elements that we will need to update frequently, such as the question progress, image, choices container, score, and feedback message. 
        // This way, we can easily update the UI without having to query the DOM multiple times, which improves performance and keeps our code organized.
        const els = {
            introTotal: document.getElementById('intro-total-q'),
            currentQ: document.getElementById('current-q'),
            totalQ: document.getElementById('total-q'),
            image: document.getElementById('animal-image'),
            choices: document.getElementById('choices-container'),
            score: document.getElementById('score'),
            finalTotal: document.getElementById('final-total'),
            feedback: document.getElementById('feedback-message')
        };

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        
        // Fisher-Yates Shuffle Algorithm
        // This function takes an array and returns a new array with the elements shuffled in random order.
        // It works by iterating through the array from the last element to the first, and for each element, it generates a random index from the remaining unshuffled portion of the array. 
        // Then it swaps the current element with the element at the random index.
        // This ensures that each element has an equal probability of ending up in any position in the shuffled array.
        // Example usage: If you have an array ['A', 'B', 'C', 'D'] and you call shuffleArray on it, you might get a new array like ['C', 'A', 'D', 'B']. 
        // Each time you call it, the order will likely be different.
        // Note: This function does not modify the original array; it creates a copy of it and shuffles the copy, which is a good practice to avoid side effects.
        // In the context of this quiz app, we use this function to shuffle the order of the answer choices for each question, as well as to randomly select which animals will be included in the quiz questions.
        // In summary, the shuffleArray function is a crucial utility for adding randomness to the quiz experience, making it more engaging and less predictable for players.  

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Show a specific screen, hide others
        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        // ==========================================
        // QUIZ LOGIC
        // ==========================================

        function initApp() {
            if (animalNames.length < 4) {
                alert("Error: You need at least 4 animals in the 'animalNames' list to play!");
                return;
            }

            // Dynamically calculate how many questions will actually be asked.
            // If QUESTIONS_PER_GAME is 20 but you only provided 15 animals, it limits it to 15.
            totalQuestionsToPlay = Math.min(QUESTIONS_PER_GAME, animalNames.length);

            // Update Start Screen Text dynamically. We update the introductory text on the start screen to reflect the actual number of questions that will be asked in the quiz. 
            // This is important for setting the right expectations for players before they start the quiz.
            els.introTotal.innerText = totalQuestionsToPlay;

            showScreen('start');
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            
            // Update Quiz UI dynamically
            els.totalQ.innerText = totalQuestionsToPlay;
            els.finalTotal.innerText = totalQuestionsToPlay;

            generateQuestions(totalQuestionsToPlay);
            loadQuestion();
            showScreen('quiz');
        }

        function generateQuestions(totalQuestions) {
            // Shuffle all animals to pick the random correct ones
            // We take a shuffled copy of the animalNames array and slice it to get the number of questions we want to ask. This ensures that we get a random selection of animals for each quiz session.
            // For each selected correct animal, we then create a question object that includes the correct answer, three random wrong answers, and the path to the image. The wrong answers are also randomly selected from the remaining animals to ensure variety.
            const shuffledPool = shuffleArray(animalNames);
            const selectedCorrectAnimals = shuffledPool.slice(0, totalQuestions);

            quizQuestions = selectedCorrectAnimals.map(correctAnimal => {
                // Get 3 random wrong answers
                // We create a pool of wrong answers by filtering out the correct animal from the original list. Then we shuffle this pool and take the first three to use as wrong options for the quiz question.
                // This ensures that the wrong answers are different for each question and adds to the challenge of the quiz. The correct answer is then combined with these wrong answers, and the order of all options is shuffled to prevent any patterns that players might guess.
                const wrongPool = animalNames.filter(animal => animal !== correctAnimal);
                const wrongAnimals = shuffleArray(wrongPool).slice(0, 3);
                
                // Combine correct and wrong, then shuffle the options
                // We create the final choices array by combining the correct answer with the three wrong answers. Then we shuffle this array to randomize the order in which the options are presented to the player. This is important to ensure that the correct answer does not always appear in the same position, which would make the quiz too predictable.
                // The resulting question object includes the correct answer, the shuffled choices, and the path to the image that will be displayed for that question. This structured format makes it easy to load each question into the UI and handle user interactions when they select an answer.
                const choices = shuffleArray([correctAnimal, ...wrongAnimals]);

                return {
                    correct: correctAnimal,
                    choices: choices,
                    imagePath: `${FOLDER_PATH}${correctAnimal}${FILE_SUFFIX}`
                };
            });
        }

        function loadQuestion() {
            const currentQ = quizQuestions[currentQuestionIndex];
            
            // Update UI with current question data
            els.currentQ.innerText = currentQuestionIndex + 1;
            els.image.src = currentQ.imagePath;
            els.choices.innerHTML = '';

            // Generate buttons for choices
            currentQ.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice;
                btn.onclick = (e) => handleAnswer(choice, e.target);
                els.choices.appendChild(btn);
            });
        }

        function handleAnswer(selectedChoice, buttonElement) {
            const currentQ = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedChoice === currentQ.correct;
            
            // Disable all buttons to prevent multiple clicks until next question loads
            const allButtons = els.choices.querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);

            // Visual feedback for correct/incorrect answer
            if (isCorrect) {
                buttonElement.classList.add('correct');
                score++;
            } else {
                buttonElement.classList.add('incorrect');
                // Highlight the correct answer for the user to see
                allButtons.forEach(btn => {
                    if (btn.innerText === currentQ.correct) {
                        btn.classList.add('correct');
                    }
                });
            }

            // Wait 2.0 seconds, then go to next question or end
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizQuestions.length) {
                    loadQuestion();
                } else {
                    endQuiz();
                }
            }, 2000);
        }

        function endQuiz() {
            els.score.innerText = score;
            
            const percentage = score / quizQuestions.length;
            // Provide feedback based on the player's performance
            // This feedback system gives players a sense of achievement and encourages them to improve. 
            // It uses simple thresholds to determine the message that will be displayed based on the percentage of correct answers. 
            // For example, if a player gets all questions right, they receive a "Perfect score!" message, while lower scores receive encouraging messages to motivate them to try again.
            if (percentage === 1) els.feedback.innerText = "Perfect score! You are an animal expert! 🏆";
            else if (percentage >= 0.7) els.feedback.innerText = "Great job! You really know your animals! 🌟";
            else if (percentage >= 0.5) els.feedback.innerText = "Not bad! But there's room for improvement. 👍";
            else els.feedback.innerText = "Keep practicing! You'll get them next time. 📚";

            // Show the result screen
            showScreen('result');
        }

        // Initialize the app on load   
        window.onload = initApp;
    </script>
</body>
</html>
